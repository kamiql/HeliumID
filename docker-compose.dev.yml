services:
  frontend:
    image: node:22
    working_dir: /app

    volumes:
      - ./frontend:/app

    command: npm run dev -- --host 0.0.0.0

    ports:
      - "5173:5173"

  backend:
    build:
      context: ./backend

    env_file:
      - .env

    volumes:
      - ./backend:/app

    depends_on:
      - mongo

    ports:
      - "8080:8080"

  mongo:
    image: mongo:8

    env_file:
      - .env

    volumes:
      - mongo_data:/data/db

    ports:
      - "27017:27017"

volumes:
  mongo_data: