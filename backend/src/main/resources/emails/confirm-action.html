<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm action</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5; font-family: Arial, Helvetica, sans-serif; color: #18181b;">
<table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
        <td align="center" style="padding: 40px 16px;">
            <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width: 520px; background-color: #ffffff; border-radius: 12px; overflow: hidden;">
                <tr>
                    <td style="padding: 36px 40px;">
                        <h1 style="margin: 0 0 24px; font-size: 26px; line-height: 1.3; color: #18181b;">
                            Confirm this action
                        </h1>

                        <p style="margin: 0 0 16px; font-size: 16px; line-height: 1.6;">
                            Hello {{username}},
                        </p>

                        <p style="margin: 0 0 28px; font-size: 16px; line-height: 1.6; color: #52525b;">
                            A confirmation was requested for your account. Enter the following code in the application to confirm this action.
                        </p>

                        <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                            <tr>
                                <td align="center">
                                    <div style="display: inline-block; padding: 16px 28px; background-color: #f4f4f5; border-radius: 8px; font-size: 32px; letter-spacing: 8px; font-weight: 700; color: #18181b;">
                                        {{code}}
                                    </div>
                                </td>
                            </tr>
                        </table>

                        <p style="margin: 28px 0 0; font-size: 13px; line-height: 1.5; color: #71717a;">
                            If you did not request this confirmation, you can safely ignore this email.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
